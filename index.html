<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droomboom Planner — Start</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-button" class="theme-toggle">🌙 Donker</button>
    <div class="container">
        <h1>🌳 De Droomboom</h1>

                <span class="icon">✍️</span> Planning Aanpassen (Editor)
            </a>
        </div>
    </div>

    <script src="app.js" defer></script>
